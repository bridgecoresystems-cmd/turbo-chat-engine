version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: turbo_chat_postgres
    environment:
      POSTGRES_USER: bridgecore_admin
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: turbo_chat_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: turbo_chat_redis
    ports:
      - "6380:6379"

volumes:
  pgdata: