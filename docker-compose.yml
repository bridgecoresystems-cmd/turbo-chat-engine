services:
  postgres:
    image: postgres:16-alpine
    container_name: turbo_chat_postgres
    environment:
      POSTGRES_USER: bridgecore_admin
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: turbo_chat_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridgecore_admin -d turbo_chat_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: turbo_chat_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chat:
    image: turbo-chat-engine
    build: .
    container_name: turbo_chat_server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://bridgecore_admin:super_secret_password@postgres:5432/turbo_chat_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      RUST_LOG: turbo_chat_engine=info
    ports:
      - "8080:8080"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: turbo_chat_nginx
    depends_on:
      - chat
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  pgdata:
