syntax = "proto3";

package turbo_chat;

message ChatMessage {
  uint64 id        = 1; // unique message id
  string room_id   = 2; // channel / room identifier
  string sender_id = 3; // user identifier
  bytes  payload   = 4; // raw message content
  int64  timestamp = 5; // unix timestamp ms
}

message Envelope {
  oneof kind {
    ChatMessage   message  = 1;
    Ack           ack      = 2;
    Typing        typing   = 3;
    Presence      presence = 4;
    EditMessage   edit     = 5;
    DeleteMessage delete   = 6;
  }
}

message EditMessage {
  uint64 message_id  = 1;
  bytes  new_payload = 2;
  string room_id     = 3; // set by server
  string sender_id   = 4; // set by server
}

message DeleteMessage {
  uint64 message_id = 1;
  string room_id    = 2; // set by server
  string sender_id  = 3; // set by server
}

message Ack {
  uint64 message_id = 1;
  string user_id    = 2; // who read it (set by server from JWT)
  string room_id    = 3;
}

// Typing indicator — broadcast to room, never persisted
message Typing {
  string room_id   = 1;
  string user_id   = 2;
  bool   is_typing = 3;
}

// Online presence — sent on join/leave
message Presence {
  string room_id = 1;
  string user_id = 2;
  string status  = 3; // "online" | "offline"
}
